<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 MateAmica – Matematica per la Scuola Primaria</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* ===== FONT & RESET ===== */
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  * { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
  body { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 25%, #a1c4fd 75%, #c2e9fb 100%); min-height: 100vh; }

  /* ===== ANIMAZIONI ===== */
  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    50%  { transform: scale(1.1); opacity: 0.9; }
    70%  { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  @keyframes popIn {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 200, 50, 0.4); }
    50%       { box-shadow: 0 0 0 12px rgba(255, 200, 50, 0); }
  }

  .bounce-in  { animation: bounceIn 0.5s cubic-bezier(0.68,-0.55,0.27,1.55) both; }
  .slide-up   { animation: slideUp 0.4s ease-out both; }
  .pop        { animation: popIn 0.25s ease-in-out both; }

  /* ===== SCHERMATA ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== PROGRESS BAR ===== */
  #progress-fill {
    background: linear-gradient(90deg, #f093fb, #f5576c, #fda085, #f6d365);
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
    transition: width 0.5s ease-in-out;
    border-radius: 999px;
  }

  /* ===== BOTTONI RISPOSTA ===== */
  .answer-btn {
    transition: all 0.2s ease;
    cursor: pointer;
    border: 3px solid transparent;
  }
  .answer-btn:hover:not(:disabled) {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }
  .answer-btn:active:not(:disabled) {
    transform: scale(0.97);
  }
  .answer-btn.correct {
    background: linear-gradient(135deg, #84fab0, #8fd3f4) !important;
    border-color: #22c55e !important;
    color: #14532d !important;
    animation: popIn 0.3s ease-in-out;
  }
  .answer-btn.wrong {
    background: linear-gradient(135deg, #fda085, #f6d365) !important;
    border-color: #ef4444 !important;
    color: #7f1d1d !important;
    animation: popIn 0.3s ease-in-out;
  }

  /* ===== CLASSE SELECTOR ===== */
  .class-btn {
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .class-btn:hover {
    transform: scale(1.1) rotate(-2deg);
  }
  .class-btn.selected {
    ring: 4px;
    transform: scale(1.15);
    animation: pulse-glow 1.5s ease-in-out infinite;
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }

  /* ===== MEDAGLIE ===== */
  .medal { font-size: 5rem; animation: bounceIn 0.6s cubic-bezier(0.68,-0.55,0.27,1.55) both; }

  /* ===== INPUT NOME ===== */
  input[type="text"] {
    outline: none;
    transition: all 0.2s ease;
  }
  input[type="text"]:focus {
    box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.4);
    transform: scale(1.01);
  }
</style>
</head>
<body class="flex items-center justify-center p-4">

<!-- ████████████████████████████████████████ -->
<!-- ██  SCHERMATA 1 – BENVENUTO             ██ -->
<!-- ████████████████████████████████████████ -->
<div id="screen-welcome" class="screen active w-full max-w-lg">
  <div class="bg-white rounded-3xl shadow-2xl p-8 slide-up">

    <!-- Logo / Titolo -->
    <div class="text-center mb-6">
      <div class="text-6xl mb-2">🎓</div>
      <h1 class="text-4xl font-black text-purple-600 tracking-tight">MateAmica</h1>
      <p class="text-gray-500 font-semibold mt-1">Matematica divertente per la Scuola Primaria</p>
    </div>

    <!-- Decorazione stella -->
    <div class="flex justify-center gap-2 mb-6 text-2xl">
      <span>⭐</span><span>🌈</span><span>🚀</span><span>🌟</span><span>🎉</span>
    </div>

    <!-- Campo Nome -->
    <div class="mb-5">
      <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">
        👦 Il tuo nome
      </label>
      <input
        type="text"
        id="student-name"
        placeholder="Scrivi il tuo nome qui..."
        class="w-full px-5 py-4 rounded-2xl border-2 border-purple-200 text-lg font-bold text-gray-700 bg-purple-50 focus:border-purple-400"
        maxlength="30"
      />
    </div>

    <!-- Selezione Classe -->
    <div class="mb-6">
      <label class="block text-sm font-bold text-gray-600 mb-3 ml-1">
        📚 La tua Classe
      </label>
      <div class="flex justify-between gap-2">
        <!-- Bottone per ogni classe 1-5 con colore diverso -->
        <button class="class-btn flex-1 py-4 rounded-2xl font-black text-lg text-white bg-gradient-to-b from-pink-400 to-pink-600 shadow-lg"
                data-class="1" onclick="selectClass(1)">
          1ª<br><span class="text-xs font-bold opacity-80">Prima</span>
        </button>
        <button class="class-btn flex-1 py-4 rounded-2xl font-black text-lg text-white bg-gradient-to-b from-orange-400 to-orange-600 shadow-lg"
                data-class="2" onclick="selectClass(2)">
          2ª<br><span class="text-xs font-bold opacity-80">Seconda</span>
        </button>
        <button class="class-btn flex-1 py-4 rounded-2xl font-black text-lg text-white bg-gradient-to-b from-yellow-400 to-yellow-600 shadow-lg"
                data-class="3" onclick="selectClass(3)">
          3ª<br><span class="text-xs font-bold opacity-80">Terza</span>
        </button>
        <button class="class-btn flex-1 py-4 rounded-2xl font-black text-lg text-white bg-gradient-to-b from-green-400 to-green-600 shadow-lg"
                data-class="4" onclick="selectClass(4)">
          4ª<br><span class="text-xs font-bold opacity-80">Quarta</span>
        </button>
        <button class="class-btn flex-1 py-4 rounded-2xl font-black text-lg text-white bg-gradient-to-b from-blue-400 to-blue-600 shadow-lg"
                data-class="5" onclick="selectClass(5)">
          5ª<br><span class="text-xs font-bold opacity-80">Quinta</span>
        </button>
      </div>
    </div>

    <!-- Errore validazione -->
    <p id="welcome-error" class="text-red-500 text-sm font-bold text-center mb-3 hidden">
      ⚠️ Inserisci il tuo nome e seleziona la classe!
    </p>

    <!-- Bottone Inizia -->
    <button onclick="startGame()"
      class="w-full py-5 rounded-2xl font-black text-xl text-white
             bg-gradient-to-r from-purple-500 via-pink-500 to-red-400
             shadow-xl hover:shadow-2xl transition-all duration-200
             hover:-translate-y-1 active:translate-y-0">
      🚀 Inizia a Giocare!
    </button>

    <p class="text-center text-xs text-gray-400 mt-4">10 domande • +10 punti per risposta giusta • Funziona offline</p>
  </div>
</div>

<!-- ████████████████████████████████████████ -->
<!-- ██  SCHERMATA 2 – GIOCO                 ██ -->
<!-- ████████████████████████████████████████ -->
<div id="screen-game" class="screen w-full max-w-lg">
  <div class="bg-white rounded-3xl shadow-2xl p-6">

    <!-- Header: Nome + Punteggio -->
    <div class="flex justify-between items-center mb-4">
      <div class="flex items-center gap-2 bg-purple-100 rounded-2xl px-4 py-2">
        <span class="text-xl">👤</span>
        <span id="display-name" class="font-black text-purple-700 text-sm"></span>
      </div>
      <div class="flex items-center gap-2 bg-yellow-100 rounded-2xl px-4 py-2">
        <span class="text-xl">⭐</span>
        <span class="font-black text-yellow-700 text-sm">Punti:</span>
        <span id="display-score" class="font-black text-yellow-600 text-lg">0</span>
      </div>
    </div>

    <!-- Barra Progresso -->
    <div class="mb-1 flex justify-between text-xs font-bold text-gray-500">
      <span>Domanda <span id="question-num">1</span> di 10</span>
      <span id="progress-label">0%</span>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-4 mb-5 overflow-hidden">
      <div id="progress-fill" class="h-4 rounded-full" style="width: 0%"></div>
    </div>

    <!-- Card Domanda -->
    <div id="question-card" class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-3xl p-6 mb-5 min-h-[120px] flex flex-col justify-center">
      <!-- Emoji/icona categoria -->
      <div id="question-emoji" class="text-4xl text-center mb-2"></div>
      <!-- Testo domanda -->
      <p id="question-text" class="text-xl font-black text-gray-800 text-center leading-snug"></p>
    </div>

    <!-- Bottoni Risposta (griglia 2x2) -->
    <div class="grid grid-cols-2 gap-3" id="answers-grid">
      <!-- I 4 bottoni vengono riempiti via JS -->
      <button id="btn-A" class="answer-btn bg-pink-100 border-pink-200 rounded-2xl p-4 text-left font-bold text-gray-700 text-sm" onclick="selectAnswer(0)">
        <span class="text-xs font-black text-pink-400 block mb-1">A</span>
        <span id="ans-A"></span>
      </button>
      <button id="btn-B" class="answer-btn bg-blue-100 border-blue-200 rounded-2xl p-4 text-left font-bold text-gray-700 text-sm" onclick="selectAnswer(1)">
        <span class="text-xs font-black text-blue-400 block mb-1">B</span>
        <span id="ans-B"></span>
      </button>
      <button id="btn-C" class="answer-btn bg-green-100 border-green-200 rounded-2xl p-4 text-left font-bold text-gray-700 text-sm" onclick="selectAnswer(2)">
        <span class="text-xs font-black text-green-400 block mb-1">C</span>
        <span id="ans-C"></span>
      </button>
      <button id="btn-D" class="answer-btn bg-orange-100 border-orange-200 rounded-2xl p-4 text-left font-bold text-gray-700 text-sm" onclick="selectAnswer(3)">
        <span class="text-xs font-black text-orange-400 block mb-1">D</span>
        <span id="ans-D"></span>
      </button>
    </div>

    <!-- Feedback Risposta -->
    <div id="feedback-box" class="mt-4 p-4 rounded-2xl text-center font-black text-lg hidden transition-all duration-300"></div>

    <!-- Bottone Prossima -->
    <button id="btn-next" onclick="nextQuestion()"
      class="hidden w-full mt-4 py-4 rounded-2xl font-black text-lg text-white
             bg-gradient-to-r from-indigo-500 to-purple-600
             shadow-lg hover:shadow-xl transition-all duration-200 hover:-translate-y-1">
      Prossima Domanda ➡️
    </button>
  </div>
</div>

<!-- ████████████████████████████████████████ -->
<!-- ██  SCHERMATA 3 – RISULTATI / DIPLOMA   ██ -->
<!-- ████████████████████████████████████████ -->
<div id="screen-results" class="screen w-full max-w-lg">
  <div class="bg-white rounded-3xl shadow-2xl p-8 text-center">

    <!-- Medaglia / Diploma -->
    <div id="medal-display" class="medal mb-2"></div>
    <h2 id="result-title" class="text-3xl font-black mb-2"></h2>
    <p id="result-subtitle" class="text-gray-500 font-semibold mb-6"></p>

    <!-- Score card -->
    <div class="bg-gradient-to-br from-yellow-50 to-orange-50 rounded-3xl p-6 mb-6 border-2 border-yellow-200">
      <p class="text-gray-500 font-bold text-sm mb-1">Punteggio Finale</p>
      <p id="final-score" class="text-5xl font-black text-yellow-600"></p>
      <p class="text-gray-400 text-sm mt-1">su 100 punti possibili</p>

      <!-- Risposte giuste / sbagliate -->
      <div class="flex justify-center gap-6 mt-4">
        <div class="text-center">
          <span class="text-2xl">✅</span>
          <p id="correct-count" class="font-black text-green-600 text-xl"></p>
          <p class="text-xs text-gray-400">Corrette</p>
        </div>
        <div class="text-center">
          <span class="text-2xl">❌</span>
          <p id="wrong-count" class="font-black text-red-500 text-xl"></p>
          <p class="text-xs text-gray-400">Sbagliate</p>
        </div>
      </div>
    </div>

    <!-- Messaggio personalizzato -->
    <p id="final-message" class="text-gray-600 font-semibold text-base mb-6 leading-relaxed"></p>

    <!-- Bottoni azione -->
    <div class="flex flex-col gap-3">
      <button onclick="restartGame()"
        class="w-full py-4 rounded-2xl font-black text-lg text-white
               bg-gradient-to-r from-purple-500 via-pink-500 to-red-400
               shadow-lg hover:shadow-xl transition-all duration-200 hover:-translate-y-1">
        🔄 Gioca ancora!
      </button>
      <button onclick="goHome()"
        class="w-full py-4 rounded-2xl font-black text-lg text-purple-600
               bg-purple-50 border-2 border-purple-200
               transition-all duration-200 hover:bg-purple-100">
        🏠 Torna al Menu
      </button>
    </div>
  </div>
</div>

<!-- ████████████████████████████████████████ -->
<!-- ██  JAVASCRIPT – LOGICA APPLICAZIONE    ██ -->
<!-- ████████████████████████████████████████ -->
<script>

// ════════════════════════════════════════════
// MESSAGGI FEEDBACK PERSONALIZZATI
// ════════════════════════════════════════════
const feedbackCorrect = [
  "🎉 Fantastico! Sei un genio!",
  "🌟 Bravissimo! Risposta perfetta!",
  "🚀 Wow, stai volando! Corretto!",
  "✨ Esatto! Sei incredibile!",
  "🏆 Super! Stai spacciando!",
  "🎯 Nel segno! Ottimo lavoro!",
  "🌈 Perfetto! Continua così!",
  "🥇 Campione! Risposta giusta!"
];
const feedbackWrong = [
  "😊 Quasi! Riprova la prossima volta!",
  "💪 Non mollare! Ci puoi riuscire!",
  "🌱 Sbagliare è imparare! Vai avanti!",
  "🎈 Peccato! La prossima la prendi!",
  "😄 Ci vuole pratica! Stai migliorando!"
];

// ════════════════════════════════════════════
// STATO GLOBALE DELL'APP
// ════════════════════════════════════════════
let state = {
  studentName: "",       // Nome alunno
  selectedClass: null,   // Classe selezionata (1-5)
  questions: [],         // 10 domande estratte casualmente
  currentIndex: 0,       // Indice domanda corrente
  score: 0,              // Punteggio
  correctAnswers: 0,     // Contatore risposte giuste
  answered: false        // Flag: già risposto alla domanda corrente
};

// ════════════════════════════════════════════
// FUNZIONE: Selezione classe (UI)
// ════════════════════════════════════════════
function selectClass(num) {
  state.selectedClass = num;
  // Reset visual di tutti i bottoni
  document.querySelectorAll('.class-btn').forEach(btn => {
    btn.classList.remove('selected', 'ring-4', 'ring-offset-2', 'ring-yellow-300');
    btn.style.transform = '';
  });
  // Evidenzia quello selezionato
  const selected = document.querySelector(`[data-class="${num}"]`);
  if (selected) {
    selected.classList.add('selected');
    selected.style.transform = 'scale(1.15)';
    selected.style.boxShadow = '0 0 0 4px rgba(250,204,21,0.6)';
  }
}

// ════════════════════════════════════════════
// FUNZIONE: Avvio partita
// ════════════════════════════════════════════
function startGame() {
  const nameInput = document.getElementById('student-name').value.trim();
  const errorEl = document.getElementById('welcome-error');

  // Validazione
  if (!nameInput || !state.selectedClass) {
    errorEl.classList.remove('hidden');
    return;
  }
  errorEl.classList.add('hidden');

  // Salva dati
  state.studentName = nameInput;
  state.score = 0;
  state.currentIndex = 0;
  state.correctAnswers = 0;

  // Estrai 10 domande casuali dalla classe selezionata
  const pool = [...curriculum[state.selectedClass]];
  state.questions = shuffleArray(pool).slice(0, 10);

  // Aggiorna UI header
  document.getElementById('display-name').textContent = state.studentName;
  document.getElementById('display-score').textContent = '0';

  // Vai alla schermata di gioco
  showScreen('screen-game');
  loadQuestion(0);
}

// ════════════════════════════════════════════
// FUNZIONE: Carica una domanda
// ════════════════════════════════════════════
function loadQuestion(index) {
  state.answered = false;
  const q = state.questions[index];

  // Aggiorna barra progresso
  const pct = Math.round((index / 10) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';
  document.getElementById('question-num').textContent = index + 1;

  // Aggiorna card domanda con animazione
  const card = document.getElementById('question-card');
  card.classList.remove('slide-up');
  void card.offsetWidth; // Force reflow per riattivare l'animazione
  card.classList.add('slide-up');

  document.getElementById('question-emoji').textContent = q.emoji;
  document.getElementById('question-text').textContent = q.text;

  // Mescola le risposte ma tieni traccia di dove va la corretta
  const shuffled = shuffleAnswers(q.answers, q.correct);

  // Riempi i 4 bottoni
  const labels = ['A', 'B', 'C', 'D'];
  const btnColors = [
    'bg-pink-100 border-pink-200',
    'bg-blue-100 border-blue-200',
    'bg-green-100 border-green-200',
    'bg-orange-100 border-orange-200'
  ];
  shuffled.answers.forEach((ans, i) => {
    const btn = document.getElementById('btn-' + labels[i]);
    btn.disabled = false;
    btn.className = `answer-btn ${btnColors[i]} rounded-2xl p-4 text-left font-bold text-gray-700 text-sm`;
    btn.querySelector('span:first-child').textContent = labels[i];
    btn.querySelector('span:last-child').textContent = ans;
    // Salva l'indice corretto sul bottone per confronto
    btn.dataset.isCorrect = (i === shuffled.correctIndex) ? "1" : "0";
  });

  // Nascondi feedback e bottone prossima
  document.getElementById('feedback-box').classList.add('hidden');
  document.getElementById('btn-next').classList.add('hidden');
}

// ════════════════════════════════════════════
// FUNZIONE: Gestione selezione risposta
// ════════════════════════════════════════════
function selectAnswer(btnIndex) {
  if (state.answered) return; // Ignora doppi click
  state.answered = true;

  const labels = ['A', 'B', 'C', 'D'];
  const clickedBtn = document.getElementById('btn-' + labels[btnIndex]);
  const isCorrect = clickedBtn.dataset.isCorrect === "1";

  // Disabilita tutti i bottoni
  labels.forEach(l => { document.getElementById('btn-' + l).disabled = true; });

  // Evidenzia corretto e sbagliato
  labels.forEach((l, i) => {
    const btn = document.getElementById('btn-' + l);
    if (btn.dataset.isCorrect === "1") {
      btn.classList.add('correct');
      btn.querySelector('span:first-child').textContent = '✅';
    } else if (i === btnIndex && !isCorrect) {
      btn.classList.add('wrong');
      btn.querySelector('span:first-child').textContent = '❌';
    }
  });

  // Feedback testuale
  const feedbackEl = document.getElementById('feedback-box');
  feedbackEl.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
  if (isCorrect) {
    state.score += 10;
    state.correctAnswers++;
    feedbackEl.className = 'mt-4 p-4 rounded-2xl text-center font-black text-lg bg-green-100 text-green-800';
    feedbackEl.textContent = randomFrom(feedbackCorrect);
    document.getElementById('display-score').textContent = state.score;
  } else {
    feedbackEl.className = 'mt-4 p-4 rounded-2xl text-center font-black text-lg bg-red-50 text-red-700';
    feedbackEl.textContent = randomFrom(feedbackWrong);
  }

  // Mostra bottone prossima / risultati
  const btnNext = document.getElementById('btn-next');
  btnNext.classList.remove('hidden');
  if (state.currentIndex >= 9) {
    btnNext.textContent = '🏆 Vedi il Risultato!';
  } else {
    btnNext.textContent = 'Prossima Domanda ➡️';
  }
}

// ════════════════════════════════════════════
// FUNZIONE: Prossima domanda
// ════════════════════════════════════════════
function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= 10) {
    showResults();
  } else {
    loadQuestion(state.currentIndex);
  }
}

// ════════════════════════════════════════════
// FUNZIONE: Schermata risultati
// ════════════════════════════════════════════
function showResults() {
  // Barra progresso al 100%
  document.getElementById('progress-fill').style.width = '100%';

  const score = state.score;
  const name = state.studentName;

  // Seleziona medaglia, titolo e messaggio in base al punteggio
  let medal, title, subtitle, message;
  if (score === 100) {
    medal = "🏆";
    title = "Campione Assoluto!";
    subtitle = "10/10 risposte corrette • Punteggio perfetto!";
    message = `${name}, sei semplicemente incredibile! 💫 Hai risposto correttamente a TUTTE le domande. Sei un vero genio della matematica! I tuoi professori saranno orgogliosi!`;
    launchConfetti();
  } else if (score >= 80) {
    medal = "🥇";
    title = "Medaglia d'Oro!";
    subtitle = "Risultato eccellente! Quasi perfetto!";
    message = `Bravissimo/a ${name}! 🌟 Hai dimostrato di conoscere molto bene la matematica. Ancora un piccolo sforzo e sarà un perfetto!`;
    launchConfetti();
  } else if (score >= 60) {
    medal = "🥈";
    title = "Medaglia d'Argento!";
    subtitle = "Buon lavoro! Sei sulla strada giusta!";
    message = `Ben fatto ${name}! 💪 Hai superato più della metà delle domande. Con un po' di pratica in più arriverai alla perfezione. Continua così!`;
  } else if (score >= 40) {
    medal = "🥉";
    title = "Medaglia di Bronzo!";
    subtitle = "Puoi fare ancora meglio!";
    message = `Coraggio ${name}! 🌱 Hai fatto del tuo meglio oggi. Studia ancora un po' queste operazioni e vedrai che la prossima volta andrà molto meglio. Non arrenderti!`;
  } else {
    medal = "📚";
    title = "Continua a Studiare!";
    subtitle = "Non mollare, si impara con la pratica!";
    message = `${name}, non ti scoraggiare! 😊 La matematica richiede tanta pratica. Rileggi i tuoi libri di testo e riprova. Ce la puoi fare! Ogni campione ha iniziato così.`;
  }

  // Aggiorna DOM schermata risultati
  document.getElementById('medal-display').textContent = medal;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-subtitle').textContent = subtitle;
  document.getElementById('final-score').textContent = score + ' pt';
  document.getElementById('correct-count').textContent = state.correctAnswers;
  document.getElementById('wrong-count').textContent = 10 - state.correctAnswers;
  document.getElementById('final-message').textContent = message;

  showScreen('screen-results');
}

// ════════════════════════════════════════════
// FUNZIONE: Ricomincia con stessa configurazione
// ════════════════════════════════════════════
function restartGame() {
  state.score = 0;
  state.currentIndex = 0;
  state.correctAnswers = 0;
  // Estrai nuove 10 domande casuali
  const pool = [...curriculum[state.selectedClass]];
  state.questions = shuffleArray(pool).slice(0, 10);
  document.getElementById('display-score').textContent = '0';
  showScreen('screen-game');
  loadQuestion(0);
}

// ════════════════════════════════════════════
// FUNZIONE: Torna al menu principale
// ════════════════════════════════════════════
function goHome() {
  state.selectedClass = null;
  document.querySelectorAll('.class-btn').forEach(btn => {
    btn.classList.remove('selected');
    btn.style.transform = '';
    btn.style.boxShadow = '';
  });
  document.getElementById('student-name').value = state.studentName;
  showScreen('screen-welcome');
}

// ════════════════════════════════════════════
// UTILITÀ: Mostra schermata
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // Scroll top
  window.scrollTo(0, 0);
}

// ════════════════════════════════════════════
// UTILITÀ: Mescola un array (Fisher-Yates)
// ════════════════════════════════════════════
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ════════════════════════════════════════════
// UTILITÀ: Mescola le risposte mantenendo il riferimento alla corretta
// ════════════════════════════════════════════
function shuffleAnswers(answers, correctIndex) {
  // Crea array di oggetti { text, isCorrect }
  const objs = answers.map((text, i) => ({ text, isCorrect: i === correctIndex }));
  // Mescola
  const shuffled = shuffleArray(objs);
  return {
    answers: shuffled.map(o => o.text),
    correctIndex: shuffled.findIndex(o => o.isCorrect)
  };
}

// ════════════════════════════════════════════
// UTILITÀ: Elemento casuale da array
// ════════════════════════════════════════════
function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ════════════════════════════════════════════
// EFFETTO CONFETTI (per punteggi alti)
// ════════════════════════════════════════════
function launchConfetti() {
  const colors = ['#ff6b9d', '#c44dff', '#ff9d3d', '#4dffbf', '#4d9fff', '#ffff4d'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.backgroundColor = randomFrom(colors);
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = (Math.random() * 1.5) + 's';
    document.body.appendChild(piece);
    // Rimuovi dopo animazione
    setTimeout(() => piece.remove(), 4500);
  }
}

// ════════════════════════════════════════════
// AVVIO: Mostra schermata benvenuto
// ════════════════════════════════════════════
showScreen('screen-welcome');

</script>
